<!DOCTYPE html>
<html lang="en">
<head>

    <title>Register - AI LearnPro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="topbar">
            <button id="sidebarToggle" class="hamburger" aria-label="Open sidebar">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
            <a href="index.html" class="brand">AI LearnPro</a>
            <div class="top-actions">
                <a href="login.html" class="button">Login</a>
                <a href="register.html" class="button primary">Register</a>
                <button id="logoutBtn" class="button">Logout</button>
            </div>
        </div>
    </header>
    <aside class="sidebar" id="sidebar">
        <button id="sidebarClose" class="sidebar-close" aria-label="Close sidebar">×</button>
        <nav class="sidebar-nav">
            <a href="index.html">Home</a>
            <a href="courses.html">Courses</a>

        </nav>
    </aside>
    <div class="backdrop" id="sidebarBackdrop"></div>
    <main>
        <h2>Register</h2>
        <form id="registerForm">
            <label for="name">Name:</label>
            <input type="text" id="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" required>
            <label for="password">Password:</label>
            <input type="password" id="password" required>
            <button type="submit">Register</button>
        </form>
        <p id="message"></p>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
